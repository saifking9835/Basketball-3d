<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flappy Dunk Clone</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: #8B4513;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        #gameContainer {
            position: relative;
            width: 100%;
            max-width: 400px;
            height: 100vh;
            background: linear-gradient(to bottom, #e5e0cc, #c9c1a9);
            overflow: hidden;
        }
        .top-bar {
            position: absolute;
            top: 20px;
            width: 100%;
            display: flex;
            justify-content: space-around;
            z-index: 10;
        }
        .score-box {
            background-color: #2b1d16;
            color: white;
            padding: 5px 15px;
            border-radius: 8px;
            text-align: center;
            min-width: 100px;
        }
        .score-box .label { font-size: 10px; color: #aaa; font-weight: bold; }
        .score-box .val { font-size: 20px; font-weight: bold; }
        .score-box.all-time .val { color: #2ed573; }
        canvas { display: block; width: 100%; height: 100%; }
        #screenOverlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            z-index: 20;
        }
        #screenOverlay h1 { font-size: 28px; margin-bottom: 15px; }
        #screenOverlay button {
            background-color: #ff4757;
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div id="gameContainer">
    <div class="top-bar">
        <div class="score-box">
            <div class="label">SCORE</div>
            <div id="currentScore" class="val">0</div>
        </div>
        <div class="score-box all-time">
            <div class="label">ALL TIME</div>
            <div id="highScore" class="val">0</div>
        </div>
    </div>
    <canvas id="gameCanvas"></canvas>
    <div id="screenOverlay">
        <h1 id="screenTitle">FLAPPY BASKETBALL</h1>
        <button id="actionBtn" onclick="startGame()">TAP TO PLAY</button>
    </div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('currentScore');
    const highScoreEl = document.getElementById('highScore');
    const overlay = document.getElementById('screenOverlay');
    const screenTitle = document.getElementById('screenTitle');
    const actionBtn = document.getElementById('actionBtn');

    function resizeCanvas() {
        canvas.width = canvas.parentElement.clientWidth;
        canvas.height = canvas.parentElement.clientHeight;
    }
    resizeCanvas();

    let ball, hoops, score, gameRunning, gameLoopId;
    let highScore = localStorage.getItem('flappy_highScore') || 0;
    const gravity = 0.4;
    const jumpForce = -7.5;

    highScoreEl.innerText = highScore;

    class Ball {
        constructor() {
            this.x = canvas.width * 0.25;
            this.y = canvas.height / 2;
            this.radius = 15;
            this.velocity = 0;
        }
        draw() {
            // Wings
            ctx.fillStyle = "#ffffff";
            ctx.strokeStyle = "#000000";
            ctx.lineWidth = 2;
            ctx.beginPath();
            if (this.velocity < 0) {
                ctx.ellipse(this.x - 18, this.y - 5, 12, 6, -Math.PI/6, 0, Math.PI * 2);
            } else {
                ctx.ellipse(this.x - 18, this.y, 12, 6, Math.PI/6, 0, Math.PI * 2);
            }
            ctx.fill(); ctx.stroke();

            // Ball
            ctx.fillStyle = "#e67e22";
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
            ctx.fill(); ctx.stroke();
            
            // Lines
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.radius, -Math.PI/4, Math.PI * 0.75);
            ctx.stroke();
        }
        update() {
            this.velocity += gravity;
            this.y += this.velocity;
            if (this.y + this.radius > canvas.height || this.y - this.radius < 0) {
                gameOver();
            }
        }
        flap() { this.velocity = jumpForce; }
    }

    class Hoop {
        constructor() {
            this.x = canvas.width + 50;
            this.y = Math.random() * (canvas.height * 0.5) + (canvas.height * 0.25);
            this.width = 70;
            this.height = 10;
            this.speed = 2.5;
            this.passed = false;
        }
        draw() {
            ctx.lineWidth = 5;
            ctx.strokeStyle = "#ff4757";
            ctx.beginPath();
            ctx.ellipse(this.x + this.width/2, this.y, this.width/2, this.height/2, 0, 0, Math.PI * 2);
            ctx.stroke();
        }
        update() { this.x -= this.speed; }
    }

    function startGame() {
        overlay.style.display = 'none';
        ball = new Ball();
        hoops = [new Hoop()];
        score = 0;
        scoreEl.innerText = score;
        gameRunning = true;
        if(gameLoopId) cancelAnimationFrame(gameLoopId);
        gameLoop();
    }

    function gameOver() {
        gameRunning = false;
        cancelAnimationFrame(gameLoopId);
        screenTitle.innerText = "GAME OVER";
        actionBtn.innerText = "PLAY AGAIN";
        overlay.style.display = 'flex';
    }

    function gameLoop() {
        if (!gameRunning) return;
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Background deco
        ctx.fillStyle = "#d1c9b0";
        ctx.beginPath();
        ctx.moveTo(0, canvas.height);
        ctx.lineTo(canvas.width * 0.5, canvas.height * 0.75);
        ctx.lineTo(canvas.width, canvas.height);
        ctx.fill();

        if (hoops.length === 0 || hoops[hoops.length - 1].x < canvas.width - 220) {
            hoops.push(new Hoop());
        }

        for (let i = hoops.length - 1; i >= 0; i--) {
            hoops[i].update();
            hoops[i].draw();

            // Check Score / Collision
            if (!hoops[i].passed && ball.x > hoops[i].x && ball.x < hoops[i].x + hoops[i].width) {
                if (Math.abs(ball.y - hoops[i].y) < 15) {
                    hoops[i].passed = true;
                    score++;
                    scoreEl.innerText = score;
                    if (score > highScore) {
                        highScore = score;
                        highScoreEl.innerText = highScore;
                        localStorage.setItem('flappy_highScore', highScore);
                    }
                }
            }

            // Missed Hoop check
            if (!hoops[i].passed && ball.x > hoops[i].x + hoops[i].width + 5) {
                gameOver();
            }

            if (hoops[i].x + hoops[i].width < 0) {
                hoops.splice(i, 1);
            }
        }

        ball.update();
        ball.draw();
        gameLoopId = requestAnimationFrame(gameLoop);
    }

    window.addEventListener('keydown', (e) => { if (e.code === 'Space' && gameRunning) ball.flap(); });
    canvas.addEventListener('touchstart', (e) => { if (gameRunning) { ball.flap(); e.preventDefault(); } }, { passive: false });
    canvas.addEventListener('mousedown', () => { if (gameRunning) ball.flap(); });
    window.addEventListener('resize', resizeCanvas);
</script>
</body>
</html>
