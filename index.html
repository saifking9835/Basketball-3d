<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Original Flappy Dunk Clone</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: #3d2936;
            font-family: 'Arial Rounded MT Bold', Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        #gameContainer {
            position: relative;
            width: 100%;
            max-width: 400px;
            height: 100vh;
            background: linear-gradient(to bottom, #e5e0cc, #c9c1a9);
            overflow: hidden;
        }
        .top-bar {
            position: absolute;
            top: 20px;
            width: 100%;
            display: flex;
            justify-content: space-around;
            z-index: 10;
        }
        .score-box {
            background-color: #2b1d16;
            color: white;
            padding: 5px 15px;
            border-radius: 8px;
            text-align: center;
            min-width: 100px;
        }
        .score-box .label { font-size: 10px; color: #aaa; font-weight: bold; }
        .score-box .val { font-size: 20px; font-weight: bold; }
        .score-box.all-time .val { color: #2ed573; }
        canvas { display: block; width: 100%; height: 100%; }
        
        /* Game Over Overlay Screen (Matching Image) */
        #screenOverlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(40, 30, 40, 0.6);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 20;
            padding: 20px;
        }
        
        /* Main Pop-up Card */
        .game-over-card {
            background-color: #a37c74;
            border-radius: 35px;
            width: 90%;
            padding: 25px 20px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
            border: 4px solid #85615a;
            position: relative;
            margin-bottom: 25px;
        }
        .game-over-card h1 {
            color: #ffffff;
            font-size: 32px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 15px;
        }
        .current-score-section {
            margin-bottom: 25px;
        }
        .current-score-section .score-lbl {
            color: #f7a379;
            font-size: 26px;
            font-weight: bold;
        }
        .current-score-section .score-num {
            color: #ffffff;
            font-size: 64px;
            font-weight: bold;
            line-height: 1;
        }
        
        /* Leaderboard Style */
        .leaderboard-box {
            background-color: #fff1df;
            border-radius: 20px;
            padding: 15px 12px;
            margin-top: 15px;
            border: 3px solid #edd3be;
        }
        .leaderboard-box .mode-title {
            color: #ff5252;
            font-size: 14px;
            font-weight: bold;
            letter-spacing: 2px;
            margin-bottom: 10px;
        }
        .score-row {
            background-color: #8a645d;
            color: white;
            border-radius: 12px;
            padding: 8px 15px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 15px;
            font-weight: bold;
        }
        .score-row:last-child { margin-bottom: 0; }
        .score-row .left-side {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .score-row.today { color: #ffd32c; }
        .score-row.week { color: #ff9ff3; }
        .score-row.alltime { color: #1dd1a1; }
        
        /* Bottom Control Buttons */
        .button-container {
            display: flex;
            width: 90%;
            gap: 15px;
            justify-content: center;
            align-items: center;
        }
        .home-btn {
            background-color: #d96e62;
            border: none;
            border-radius: 15px;
            width: 65px;
            height: 60px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 5px 0 #b05349;
        }
        .home-btn svg { fill: white; width: 28px; height: 28px; }
        .play-again-btn {
            background-color: #2ed573;
            color: white;
            border: none;
            border-radius: 15px;
            flex-grow: 1;
            height: 60px;
            font-size: 22px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 5px 0 #26af5f;
            text-transform: uppercase;
        }
        .home-btn:active, .play-again-btn:active {
            transform: translateY(4px);
            box-shadow: none;
        }

        #bonusText {
            position: absolute;
            color: #ffd700;
            font-weight: bold;
            font-size: 24px;
            display: none;
            text-shadow: 2px 2px 4px #000;
            z-index: 15;
            pointer-events: none;
        }
    </style>
</head>
<body>

<div id="gameContainer">
    <div class="top-bar">
        <div class="score-box">
            <div class="label">SCORE</div>
            <div id="currentScore" class="val">0</div>
        </div>
        <div class="score-box all-time">
            <div class="label">ALL TIME</div>
            <div id="highScore" class="val">0</div>
        </div>
    </div>
    <div id="bonusText">2X PERFECT!</div>
    <canvas id="gameCanvas"></canvas>
    
    <div id="screenOverlay">
        <div class="game-over-card">
            <h1 id="screenTitle">GAME OVER</h1>
            
            <div class="current-score-section">
                <div class="score-lbl">Score</div>
                <div id="finalScore" class="score-num">0</div>
            </div>

            <div class="leaderboard-box">
                <div class="mode-title">HARD MODE</div>
                
                <div class="score-row today">
                    <div class="left-side">🏆 Today's best</div>
                    <div id="todayBestVal">0</div>
                </div>
                <div class="score-row week">
                    <div class="left-side">🏆 Week's best</div>
                    <div id="weekBestVal">0</div>
                </div>
                <div class="score-row alltime">
                    <div class="left-side">🏆 All-time best</div>
                    <div id="allTimeBestVal">0</div>
                </div>
            </div>
        </div>

        <div class="button-container">
            <button class="home-btn" onclick="resetLeaderboard()">
                <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
            </button>
            <button class="play-again-btn" onclick="startGame()">PLAY AGAIN</button>
        </div>
    </div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('currentScore');
    const highScoreEl = document.getElementById('highScore');
    const overlay = document.getElementById('screenOverlay');
    const finalScoreEl = document.getElementById('finalScore');
    
    const todayBestEl = document.getElementById('todayBestVal');
    const weekBestEl = document.getElementById('weekBestVal');
    const allTimeBestEl = document.getElementById('allTimeBestVal');
    const bonusText = document.getElementById('bonusText');

    function resizeCanvas() {
        canvas.width = canvas.parentElement.clientWidth;
        canvas.height = canvas.parentElement.clientHeight;
    }
    resizeCanvas();

    let ball, hoops, score, gameRunning, gameLoopId;
    
    // Scores storage setup
    let highScore = localStorage.getItem('fd_alltime') || 0;
    let todayBest = localStorage.getItem('fd_today') || 0;
    let weekBest = localStorage.getItem('fd_week') || 0;

    highScoreEl.innerText = highScore;

    class Ball {
        constructor() {
            this.x = canvas.width * 0.25;
            this.y = canvas.height / 2;
            this.radius = 14;
            this.velocity = 0;
        }
        draw() {
            ctx.fillStyle = "#ffffff";
            ctx.strokeStyle = "#000000";
            ctx.lineWidth = 2.5;

            // Left Wing
            ctx.beginPath();
            if (this.velocity < 0) {
                ctx.ellipse(this.x - 16, this.y - 5, 12, 6, -Math.PI/6, 0, Math.PI * 2);
            } else {
                ctx.ellipse(this.x - 16, this.y + 2, 12, 6, Math.PI/6, 0, Math.PI * 2);
            }
            ctx.fill(); ctx.stroke();

            // Right Wing
            ctx.beginPath();
            if (this.velocity < 0) {
                ctx.ellipse(this.x + 16, this.y - 5, 12, 6, Math.PI/6, 0, Math.PI * 2);
            } else {
                ctx.ellipse(this.x + 16, this.y + 2, 12, 6, -Math.PI/6, 0, Math.PI * 2);
            }
            ctx.fill(); ctx.stroke();

            // Basketball
            ctx.fillStyle = "#e67e22";
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
            ctx.fill(); ctx.stroke();
            
            ctx.lineWidth = 1.5;
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.radius, -Math.PI/4, Math.PI * 0.75);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(this.x - this.radius, this.y);
            ctx.lineTo(this.x + this.radius, this.y);
            ctx.stroke();
        }
        update() {
            this.velocity += 0.38; // gravity
            this.y += this.velocity;
            if (this.y + this.radius > canvas.height || this.y - this.radius < 0) {
                gameOver();
            }
        }
        flap() { this.velocity = -7.2; }
    }

    class Hoop {
        constructor() {
            this.x = canvas.width + 60;
            this.y = Math.random() * (canvas.height * 0.45) + (canvas.height * 0.25);
            this.width = 90; 
            this.height = 14;
            this.speed = 2.4;
            this.passed = false;
            this.touchedRim = false; 
        }
        drawNet() {
            ctx.strokeStyle = "rgba(255, 255, 255, 0.6)";
            ctx.lineWidth = 2;
            ctx.fillStyle = "rgba(255, 255, 255, 0.15)";
            ctx.beginPath();
            ctx.moveTo(this.x, this.y);
            ctx.lineTo(this.x + 15, this.y + 35);
            ctx.lineTo(this.x + this.width - 15, this.y + 35);
            ctx.lineTo(this.x + this.width, this.y);
            ctx.closePath();
            ctx.fill(); ctx.stroke();
        }
        drawRim() {
            ctx.lineWidth = 6;
            ctx.strokeStyle = "#ff4757";
            ctx.beginPath();
            ctx.ellipse(this.x + this.width/2, this.y, this.width/2, this.height/2, 0, 0, Math.PI * 2);
            ctx.stroke();
        }
        update() { this.x -= this.speed; }
    }

    function showBonusEffect(x, y) {
        bonusText.style.left = x + 'px';
        bonusText.style.top = (y - 40) + 'px';
        bonusText.style.display = 'block';
        setTimeout(() => { bonusText.style.display = 'none'; }, 800);
    }

    function startGame() {
        overlay.style.display = 'none';
        ball = new Ball();
        hoops = [new Hoop()];
        score = 0;
        scoreEl.innerText = score;
        gameRunning = true;
        if(gameLoopId) cancelAnimationFrame(gameLoopId);
        gameLoop();
    }

    function gameOver() {
        gameRunning = false;
        cancelAnimationFrame(gameLoopId);
        
        finalScoreEl.innerText = score;

        // Highscore update logic
        if (score > todayBest) { todayBest = score; localStorage.setItem('fd_today', todayBest); }
        if (score > weekBest) { weekBest = score; localStorage.setItem('fd_week', weekBest); }
        if (score > highScore) { 
            highScore = score; 
            localStorage.setItem('fd_alltime', highScore); 
            highScoreEl.innerText = highScore;
        }

        // Leaderboard labels refresh
        todayBestEl.innerText = todayBest;
        weekBestEl.innerText = weekBest;
        allTimeBestEl.innerText = highScore;

        overlay.style.display = 'flex';
    }

    function resetLeaderboard() {
        // Home button clicked: clears scores for a fresh start
        localStorage.setItem('fd_today', 0);
        localStorage.setItem('fd_week', 0);
        localStorage.setItem('fd_alltime', 0);
        todayBest = 0; weekBest = 0; highScore = 0;
        highScoreEl.innerText = 0;
        alert("Scores Reset Successfully!");
        startGame();
    }

    function gameLoop() {
        if (!gameRunning) return;
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Simple Background
        ctx.fillStyle = "#d1c9b0";
        ctx.beginPath();
        ctx.moveTo(0, canvas.height);
        ctx.lineTo(canvas.width * 0.5, canvas.height * 0.75);
        ctx.lineTo(canvas.width, canvas.height);
        ctx.fill();

        if (hoops.length === 0 || hoops[hoops.length - 1].x < canvas.width - 240) {
            hoops.push(new Hoop());
        }

        for (let i = 0; i < hoops.length; i++) hoops[i].drawNet();

        for (let i = hoops.length - 1; i >= 0; i--) {
            let h = hoops[i];
            h.update();
            h.drawRim();

            let leftRimX = h.x;
            let rightRimX = h.x + h.width;

            // Rim collision
            if (Math.hypot(ball.x - leftRimX, ball.y - h.y) < ball.radius + 3 || Math.hypot(ball.x - rightRimX, ball.y - h.y) < ball.radius + 3) {
                h.touchedRim = true;
            }

            // Down to Top Entry -> Out
            if (!h.passed && ball.x > leftRimX && ball.x < rightRimX) {
                if (ball.y > h.y && ball.velocity < 0 && Math.abs(ball.y - h.y) < ball.radius + 5) {
                    gameOver(); return;
                }
            }

            // Top to Down Score Dunk
            if (!h.passed && ball.x > leftRimX && ball.x < rightRimX) {
                if (ball.y >= h.y && (ball.y - ball.velocity) < h.y) {
                    h.passed = true;
                    let hoopCenter = h.x + h.width / 2;
                    if (!h.touchedRim && Math.abs(ball.x - hoopCenter) < 15) {
                        score += 2;
                        showBonusEffect(ball.x, ball.y);
                    } else {
                        score += 1;
                    }
                    scoreEl.innerText = score;
                }
            }

            if (!h.passed && ball.x > rightRimX + 10) { gameOver(); return; }
            if (h.x + h.width < 0) hoops.splice(i, 1);
        }

        ball.update();
        ball.draw();
        gameLoopId = requestAnimationFrame(gameLoop);
    }

    window.addEventListener('keydown', (e) => { if (e.code === 'Space' && gameRunning) ball.flap(); });
    canvas.addEventListener('touchstart', (e) => { if (gameRunning) { ball.flap(); e.preventDefault(); } }, { passive: false });
    canvas.addEventListener('mousedown', () => { if (gameRunning) ball.flap(); });
    window.addEventListener('resize', resizeCanvas);
    
    // Auto load first play screen overlay elements
    todayBestEl.innerText = todayBest;
    weekBestEl.innerText = weekBest;
    allTimeBestEl.innerText = highScore;
</script>
</body>
</html>
