<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flappy Jump - Master Edition</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: #3d2936;
            font-family: 'Arial Rounded MT Bold', Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            user-select: none;
        }
        #gameContainer {
            position: relative;
            width: 100%;
            max-width: 400px;
            height: 100vh;
            background: linear-gradient(to bottom, #e5e0cc, #c9c1a9);
            overflow: hidden;
        }
        
        /* Top HUD Controls */
        .top-bar {
            position: absolute;
            top: 20px;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 15px;
            z-index: 15;
            display: none; /* Game start hone par hi dikhega */
        }
        .score-box {
            background-color: #2b1d16;
            color: white;
            padding: 5px 12px;
            border-radius: 8px;
            text-align: center;
            min-width: 95px;
        }
        .score-box .label { font-size: 9px; color: #aaa; font-weight: bold; }
        .score-box .val { font-size: 18px; font-weight: bold; }
        
        /* Audio Buttons Container in Top HUD */
        .audio-cluster {
            display: flex;
            gap: 8px;
        }
        .audio-btn {
            width: 36px;
            height: 36px;
            background-color: #2b1d16;
            border: 2px solid #5a4033;
            border-radius: 50%;
            color: white;
            font-size: 14px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 3px 0 #110906;
        }
        .audio-btn.muted {
            background-color: #c0392b;
            border-color: #e74c3c;
        }
        
        canvas { display: block; width: 100%; height: 100%; }

        /* Menu Panel Configuration */
        #menuOverlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, #e59834, #df7622);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            z-index: 30;
            padding: 40px 20px;
        }
        .menu-header h1 { color: white; font-size: 34px; text-shadow: 0 4px 6px rgba(0,0,0,0.2); }
        .menu-header p { color: #fff1e0; font-size: 14px; margin-top: 5px; }
        
        .mode-panel {
            background-color: #fff9f2;
            width: 100%;
            border-radius: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 30px 20px;
            gap: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.15);
        }
        .avatar-container {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: white;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 5px 0 rgba(0,0,0,0.06);
        }
        .emoji-face {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            position: relative;
            border: 5px solid #000;
        }
        .emoji-face.easy-face { background-color: #2ecc71; }
        .emoji-face.medium-face { background-color: #f1c40f; }
        .emoji-face.hard-face { background-color: #e74c3c; }
        
        /* Horns for Hard Avatar */
        .emoji-face.hard-face::before, .emoji-face.hard-face::after {
            content: ''; position: absolute; top: -10px; width: 18px; height: 18px; background: #000; border-radius: 50%;
        }
        .emoji-face.hard-face::before { left: -4px; }
        .emoji-face.hard-face::after { right: -4px; }

        .mode-title-text { font-size: 36px; font-weight: 900; text-transform: uppercase; }
        
        /* Interactive Stepper Track */
        .slider-wrapper {
            width: 85%;
            position: relative;
            padding: 10px 0;
        }
        .slider-track {
            width: 100%;
            height: 24px;
            background-color: #7f8c8d;
            border-radius: 15px;
            position: relative;
            border: 3px solid white;
            cursor: pointer;
        }
        .slider-fill {
            height: 100%;
            border-radius: 12px;
            width: 0%;
            transition: width 0.2s ease, background-color 0.2s ease;
        }
        .slider-thumb {
            position: absolute;
            top: -4px;
            left: 0%;
            width: 26px;
            height: 26px;
            border-radius: 50%;
            background: white;
            border: 4px solid #2ecc71;
            transform: translateX(-50%);
            transition: left 0.2s ease, border-color 0.2s ease;
            cursor: pointer;
        }
        
        .main-play-btn {
            width: 85%; height: 55px; border: none; border-radius: 18px;
            font-size: 24px; font-weight: bold; color: white; cursor: pointer;
            text-transform: uppercase;
        }

        /* Leaderboard Modal Overlays */
        #screenOverlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(40, 30, 40, 0.6);
            display: none; flex-direction: column;
            justify-content: center; align-items: center; z-index: 25; padding: 20px;
        }
        .game-over-card {
            background-color: #a37c74; border-radius: 35px; width: 90%;
            padding: 25px 20px; text-align: center; border: 4px solid #85615a;
        }
        .game-over-card h1 { color: white; font-size: 32px; margin-bottom: 10px; }
        .score-num { color: white; font-size: 58px; font-weight: bold; }
        .leaderboard-box { background-color: #fff1df; border-radius: 20px; padding: 15px; margin-top: 15px; }
        .score-row {
            background-color: #8a645d; color: white; border-radius: 12px;
            padding: 8px 15px; margin-bottom: 6px; display: flex; justify-content: space-between; font-weight: bold;
        }
        .button-container { display: flex; width: 90%; gap: 15px; margin-top: 20px; }
        .home-btn { background-color: #d96e62; border: none; border-radius: 15px; width: 65px; height: 60px; cursor: pointer; display: flex; justify-content: center; align-items: center; box-shadow: 0 5px 0 #b05349;}
        .play-again-btn { background-color: #2ed573; color: white; border: none; border-radius: 15px; flex-grow: 1; height: 60px; font-size: 20px; font-weight: bold; cursor: pointer; box-shadow: 0 5px 0 #26af5f; }

        #bonusSplash {
            position: absolute; color: #ffd700; font-weight: bold; font-size: 30px;
            display: none; text-shadow: 2px 2px 6px #000; z-index: 20; pointer-events: none;
            animation: bounceIn 0.4s ease-out;
        }
        @keyframes bounceIn {
            0% { transform: scale(0.2); opacity: 0; }
            70% { transform: scale(1.1); }
            100% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>

<div id="gameContainer">
    <div id="gameHUD" class="top-bar">
        <div class="score-box"><div id="hudModeName" class="label">EASY</div><div id="currentScore" class="val">0</div></div>
        
        <div class="audio-cluster">
            <button id="musicBtn" class="audio-btn" onclick="toggleMusic()">🎵</button>
            <button id="sfxBtn" class="audio-btn" onclick="toggleSFX()">🔊</button>
        </div>

        <div class="score-box"><div class="label">ALL TIME</div><div id="highScore" class="val">0</div></div>
    </div>

    <div id="bonusSplash">2X SWISH!</div>
    
    <div id="menuOverlay">
        <div class="menu-header">
            <h1>FLAPPY JUMP</h1>
            <p>Tap to jump and slam dunk into the rings!</p>
        </div>
        
        <div class="mode-panel">
            <div class="avatar-container">
                <div id="menuAvatar" class="emoji-face easy-face">
                    <div style="position:absolute; width:10px; height:10px; background:#000; border-radius:50%; top:24px; left:18px;"></div>
                    <div style="position:absolute; width:10px; height:10px; background:#000; border-radius:50%; top:24px; right:18px;"></div>
                    <div id="avatarMouth" style="position:absolute; width:22px; height:10px; border-bottom:4px solid #000; border-radius:0 0 10px 10px; top:42px; left:24px;"></div>
                </div>
            </div>
            
            <div id="menuModeTitle" class="mode-title-text" style="color: #2ecc71;">EASY</div>
            
            <div class="slider-wrapper">
                <div class="slider-track" onclick="handleSliderClick(event)">
                    <div id="sliderFill" class="slider-fill" style="width: 0%; background-color: #2ecc71;"></div>
                    <div id="sliderThumb" class="slider-thumb" style="left: 0%; border-color: #2ecc71;"></div>
                </div>
            </div>
            
            <button id="playBtn" class="main-play-btn" onclick="launchGame()" style="background-color: #2ecc71; box-shadow: 0 5px 0 #27ae60;">PLAY</button>
        </div>
        <div></div>
    </div>
    
    <canvas id="gameCanvas"></canvas>
    
    <div id="screenOverlay">
        <div class="game-over-card">
            <h1>GAME OVER</h1>
            <div><div style="color: #f7a379; font-size:22px; font-weight:bold;">Score</div><div id="finalScore" class="score-num">0</div></div>
            <div class="leaderboard-box">
                <div id="leaderboardTitle" style="color:#ff5252; font-weight:bold; margin-bottom:10px;">EASY MODE</div>
                <div class="score-row"><div>🏆 Today's Best</div><div id="todayBestVal">0</div></div>
                <div class="score-row"><div>🏆 Week's Best</div><div id="weekBestVal">0</div></div>
                <div class="score-row"><div>🏆 All-Time</div><div id="allTimeBestVal">0</div></div>
            </div>
        </div>
        <div class="button-container">
            <button class="home-btn" onclick="exitToMenu()"><span style="color:white; font-size:22px;">🏠</span></button>
            <button class="play-again-btn" onclick="launchGame()">PLAY AGAIN</button>
        </div>
    </div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('currentScore');
    const highScoreEl = document.getElementById('highScore');
    const screenOverlay = document.getElementById('screenOverlay');
    const menuOverlay = document.getElementById('menuOverlay');
    const gameHUD = document.getElementById('gameHUD');
    const finalScoreEl = document.getElementById('finalScore');
    
    const menuAvatar = document.getElementById('menuAvatar');
    const menuModeTitle = document.getElementById('menuModeTitle');
    const sliderFill = document.getElementById('sliderFill');
    const sliderThumb = document.getElementById('sliderThumb');
    const avatarMouth = document.getElementById('avatarMouth');
    const playBtn = document.getElementById('playBtn');

    let currentModeIndex = 0; 
    const modes = [
        { name: "EASY", color: "#2ecc71", fill: "0%", speed: 2.0, gap: 270, box: "#27ae60" },
        { name: "MEDIUM", color: "#f1c40f", fill: "50%", speed: 2.7, gap: 230, box: "#d4ac0d" },
        { name: "HARD", color: "#e74c3c", fill: "100%", speed: 3.5, gap: 190, box: "#c0392b" }
    ];

    let musicEnabled = true;
    let sfxEnabled = true;
    let audioCtx = null;

    function toggleMusic() {
        musicEnabled = !musicEnabled;
        document.getElementById('musicBtn').classList.toggle('muted', !musicEnabled);
        playBeep(450, 'sine', 0.05);
    }
    function toggleSFX() {
        sfxEnabled = !sfxEnabled;
        document.getElementById('sfxBtn').classList.toggle('muted', !sfxEnabled);
        if(sfxEnabled) playBeep(550, 'sine', 0.05);
    }

    function initAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
    function playBeep(freq, type, duration) {
        if (!sfxEnabled) return;
        try {
            initAudio();
            let osc = audioCtx.createOscillator();
            let gain = audioCtx.createGain();
            osc.type = type; osc.frequency.value = freq;
            gain.gain.setValueAtTime(0.12, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + duration);
        } catch(e){}
    }

    function resizeCanvas() {
        canvas.width = canvas.parentElement.clientWidth;
        canvas.height = canvas.parentElement.clientHeight;
    }
    resizeCanvas();

    let ball, hoops, particles, score, gameRunning, gameLoopId;
    let swishStreak = 0; 
    let showCross = false, crossX = 0, crossY = 0;

    function handleSliderClick(e) {
        const rect = e.currentTarget.getBoundingClientRect();
        const pct = (e.clientX - rect.left) / rect.width;
        if (pct < 0.33) currentModeIndex = 0;
        else if (pct < 0.66) currentModeIndex = 1;
        else currentModeIndex = 2;
        updateMenuUI();
        playBeep(400, 'sine', 0.08);
    }

    function updateMenuUI() {
        const m = modes[currentModeIndex];
        menuModeTitle.innerText = m.name;
        menuModeTitle.style.color = m.color;
        sliderFill.style.width = m.fill;
        sliderFill.style.backgroundColor = m.color;
        sliderThumb.style.left = m.fill;
        sliderThumb.style.borderColor = m.color;
        playBtn.style.backgroundColor = m.color;
        playBtn.style.boxShadow = `0 5px 0 ${m.box}`;

        menuAvatar.className = "emoji-face";
        if(currentModeIndex === 0) {
            menuAvatar.classList.add("easy-face");
            avatarMouth.style.borderRadius = "0 0 10px 10px"; avatarMouth.style.height = "10px";
        } else if(currentModeIndex === 1) {
            menuAvatar.classList.add("medium-face");
            avatarMouth.style.borderRadius = "0"; avatarMouth.style.height = "3px";
        } else {
            menuAvatar.classList.add("hard-face");
            avatarMouth.style.borderRadius = "10px 10px 0 0"; avatarMouth.style.height = "8px";
        }
        highScoreEl.innerText = localStorage.getItem(`fj_alltime_${m.name}`) || 0;
    }

    class Ball {
        constructor() {
            this.x = canvas.width * 0.25;
            this.y = canvas.height / 2;
            this.radius = 14;
            this.velocity = 0;
        }
        draw() {
            ctx.fillStyle = "#ffffff"; ctx.strokeStyle = "#000000"; ctx.lineWidth = 2.5;
            ctx.beginPath();
            let wingY = (this.velocity < 0) ? -5 : 2;
            let angle = (this.velocity < 0) ? -Math.PI/6 : Math.PI/6;
            ctx.ellipse(this.x - 16, this.y + wingY, 12, 6, angle, 0, Math.PI * 2);
            ctx.ellipse(this.x + 16, this.y + wingY, 12, 6, -angle, 0, Math.PI * 2);
            ctx.fill(); ctx.stroke();

            ctx.fillStyle = "#e67e22"; ctx.beginPath();
            ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
            ctx.lineWidth = 1.5; ctx.beginPath();
            ctx.arc(this.x, this.y, this.radius, -Math.PI/4, Math.PI * 0.75); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(this.x - this.radius, this.y); ctx.lineTo(this.x + this.radius, this.y); ctx.stroke();
        }
        update() {
            this.velocity += 0.38; this.y += this.velocity;
            if (this.y + this.radius > canvas.height || this.y - this.radius < 0) {
                triggerCross(canvas.width / 2, canvas.height / 2);
            }
        }
    }

    class Hoop {
        constructor() {
            this.x = canvas.width + 60;
            this.y = Math.random() * (canvas.height * 0.45) + (canvas.height * 0.22);
            this.width = 95; this.height = 22; 
            this.speed = modes[currentModeIndex].speed;
            this.passed = false;
            this.touchedRim = false;
            this.hasShield = false;
        }
        drawRim() {
            ctx.lineWidth = 7; ctx.strokeStyle = "#1a1a1a";
            ctx.beginPath(); ctx.ellipse(this.x + this.width/2, this.y, this.width/2, this.height/2, 0, 0, Math.PI * 2); ctx.stroke();

            let grad = ctx.createLinearGradient(this.x, this.y - this.height/2, this.x, this.y + this.height/2);
            grad.addColorStop(0, "#ff5252"); grad.addColorStop(1, "#b31b27");
            ctx.fillStyle = grad; ctx.beginPath();
            ctx.ellipse(this.x + this.width/2, this.y, this.width/2, this.height/2, 0, 0, Math.PI * 2); ctx.fill();

            ctx.lineWidth = 2; ctx.strokeStyle = "rgba(255, 255, 255, 0.7)";
            ctx.beginPath(); ctx.ellipse(this.x + this.width/2, this.y - 3, this.width/2.2, this.height/4, 0, Math.PI, Math.PI * 2); ctx.stroke();

            if (this.hasShield) {
                ctx.save();
                ctx.lineWidth = 4; ctx.strokeStyle = "rgba(0, 255, 240, 0.8)";
                ctx.shadowBlur = 10; ctx.shadowColor = "#00fff0";
                ctx.beginPath();
                ctx.arc(this.x + this.width/2, this.y + 6, this.width/2 + 5, 0, Math.PI);
                ctx.stroke();
                ctx.restore();
            }
        }
    }

    function createGlowTrail(x, y) {
        for(let i=0; i<2; i++) {
            particles.push({
                x: x, y: y + (Math.random() * 10 - 5),
                size: Math.random() * 6 + 3,
                alpha: 1, speedX: -(Math.random() * 1.5 + 0.5)
            });
        }
    }

    function launchGame() {
        initAudio();
        menuOverlay.style.display = 'none'; screenOverlay.style.display = 'none';
        gameHUD.style.display = 'flex';
        
        showCross = false; swishStreak = 0;
        ball = new Ball(); hoops = [new Hoop()]; particles = [];
        score = 0; scoreEl.innerText = score;
        
        document.getElementById('hudModeName').innerText = modes[currentModeIndex].name;
        gameRunning = true;
        if(gameLoopId) cancelAnimationFrame(gameLoopId);
        gameLoop();
    }

    function triggerCross(x, y) {
        gameRunning = false; showCross = true; crossX = x; crossY = y;
        playBeep(180, 'sawtooth', 0.4);

        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "#d1c9b0"; ctx.beginPath(); ctx.moveTo(0, canvas.height); ctx.lineTo(canvas.width * 0.5, canvas.height * 0.75); ctx.lineTo(canvas.width, canvas.height); ctx.fill();
        hoops.forEach(h => h.drawRim());
        ball.draw();

        ctx.lineWidth = 15; ctx.strokeStyle = "rgba(75, 65, 65, 0.9)"; ctx.lineCap = "round";
        ctx.beginPath(); ctx.moveTo(x - 40, y - 40); ctx.lineTo(x + 40, y + 40); ctx.moveTo(x + 40, y - 40); ctx.lineTo(x - 40, y + 40); ctx.stroke();

        setTimeout(showGameOverCard, 1000);
    }

    function showGameOverCard() {
        cancelAnimationFrame(gameLoopId);
        finalScoreEl.innerText = score;
        const modeName = modes[currentModeIndex].name;
        document.getElementById('leaderboardTitle').innerText = `${modeName} MODE`;

        let today = localStorage.getItem(`fj_today_${modeName}`) || 0;
        let week = localStorage.getItem(`fj_week_${modeName}`) || 0;
        let alltime = localStorage.getItem(`fj_alltime_${modeName}`) || 0;

        if(score > today) { today = score; localStorage.setItem(`fj_today_${modeName}`, score); }
        if(score > week) { week = score; localStorage.setItem(`fj_week_${modeName}`, score); }
        if(score > alltime) { alltime = score; localStorage.setItem(`fj_alltime_${modeName}`, score); }

        document.getElementById('todayBestVal').innerText = today;
        document.getElementById('weekBestVal').innerText = week;
        document.getElementById('allTimeBestVal').innerText = alltime;

        screenOverlay.style.display = 'flex';
    }

    function exitToMenu() {
        screenOverlay.style.display = 'none'; gameHUD.style.display = 'none';
        menuOverlay.style.display = 'flex'; updateMenuUI();
    }

    function triggerSplash(txt) {
        const sp = document.getElementById('bonusSplash');
        sp.innerText = txt; sp.style.display = 'block';
        sp.style.left = (canvas.width / 2 - 80) + 'px'; sp.style.top = (canvas.height * 0.35) + 'px';
        setTimeout(() => { sp.style.display = 'none'; }, 900);
    }

    function gameLoop() {
        if (!gameRunning) return;
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        ctx.fillStyle = "#d1c9b0"; ctx.beginPath(); ctx.moveTo(0, canvas.height); ctx.lineTo(canvas.width * 0.5, canvas.height * 0.75); ctx.lineTo(canvas.width, canvas.height); ctx.fill();

        const config = modes[currentModeIndex];
        if (hoops.length === 0 || hoops[hoops.length - 1].x < canvas.width - modes[currentModeIndex].gap) {
            let nH = new Hoop();
            if([12, 24, 34, 56, 89].includes(score)) nH.hasShield = true;
            hoops.push(nH);
        }

        for (let i = particles.length - 1; i >= 0; i--) {
            let p = particles[i]; p.x += p.speedX; p.alpha -= 0.02;
            if(p.alpha <= 0) { particles.splice(i, 1); continue; }
            ctx.fillStyle = `rgba(255, 215, 0, ${p.alpha})`;
            ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); ctx.fill();
        }

        for (let i = hoops.length - 1; i >= 0; i--) {
            let h = hoops[i]; h.x -= h.speed;
            
            createGlowTrail(h.x + h.width, h.y);
            createGlowTrail(h.x, h.y);

            h.drawRim();

            let rLeft = h.x + 6; let rRight = h.x + h.width - 6;

            if (h.hasShield) {
                let distToCenter = Math.hypot(ball.x - (h.x + h.width/2), ball.y - h.y);
                if (distToCenter < ball.radius + h.width/2) {
                    h.hasShield = false; 
                    ball.velocity = -5; 
                    playBeep(600, 'triangle', 0.25);
                    continue;
                }
            }

            let dLeft = Math.hypot(ball.x - h.x, ball.y - h.y);
            let dRight = Math.hypot(ball.x - (h.x + h.width), ball.y - h.y);
            if(dLeft < ball.radius + 3 || dRight < ball.radius + 3) {
                h.touchedRim = true;
            }

            if (!h.passed && ball.x > rLeft && ball.x < rRight) {
                if (ball.y > h.y && ball.velocity < 0 && Math.abs(ball.y - h.y) < ball.radius + 5) {
                    triggerCross(h.x + h.width/2, h.y); return;
                }
            }

            if (!h.passed && ball.x > rLeft && ball.x < rRight) {
                if (ball.y >= h.y && (ball.y - ball.velocity) < h.y) {
                    h.passed = true;
                    if (!h.touchedRim) {
                        swishStreak++;
                        let mult = swishStreak + 1;
                        score += mult;
                        triggerSplash(mult === 2 ? `2X SWISH!` : `${mult}X MULTI!`);
                        playBeep(880, 'sine', 0.15);
                    } else {
                        swishStreak = 0; score += 1;
                        playBeep(520, 'sine', 0.1);
                    }
                    scoreEl.innerText = score;
                }
            }

            if (!h.passed && ball.x > rRight + 10) { triggerCross(h.x + h.width/2, h.y); return; }
            if (h.x + h.width < 0) hoops.splice(i, 1);
        }

        ball.update(); ball.draw();
        gameLoopId = requestAnimationFrame(gameLoop);
    }

    window.addEventListener('keydown', (e) => { if(e.code === 'Space' && gameRunning) { ball.flap(); playBeep(330, 'sine', 0.05); } });
    canvas.addEventListener('touchstart', (e) => { if(gameRunning) { ball.flap(); playBeep(330, 'sine', 0.05); e.preventDefault(); } }, {passive:false});
    canvas.addEventListener('mousedown', () => { if(gameRunning) { ball.flap(); playBeep(330, 'sine', 0.05); } });
    window.addEventListener('resize', resizeCanvas);

    updateMenuUI();
</script>
</body>
</html>
