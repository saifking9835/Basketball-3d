<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flappy Jump - Multi Mode</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: #3d2936;
            font-family: 'Arial Rounded MT Bold', Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            user-select: none;
        }
        #gameContainer {
            position: relative;
            width: 100%;
            max-width: 400px;
            height: 100vh;
            background: linear-gradient(to bottom, #e5e0cc, #c9c1a9);
            overflow: hidden;
        }
        
        /* Top HUD Bar */
        .top-bar {
            position: absolute;
            top: 20px;
            width: 100%;
            display: flex;
            justify-content: space-around;
            z-index: 10;
            display: none; /* Game start hone par hi dikhega */
        }
        .score-box {
            background-color: #2b1d16;
            color: white;
            padding: 5px 15px;
            border-radius: 8px;
            text-align: center;
            min-width: 110px;
        }
        .score-box .label { font-size: 10px; color: #aaa; font-weight: bold; text-transform: uppercase; }
        .score-box .val { font-size: 20px; font-weight: bold; }
        .score-box.all-time .val { color: #ffd32c; }
        canvas { display: block; width: 100%; height: 100%; }

        /* START MENU SCREEN STYLE (Matches 1000001987.jpg) */
        #menuOverlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, #e59834, #df7622);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            z-index: 30;
            padding: 40px 20px 5px 20px;
            text-align: center;
        }
        .menu-header h1 {
            color: white;
            font-size: 34px;
            letter-spacing: 1px;
            text-shadow: 0 4px 6px rgba(0,0,0,0.2);
            margin-bottom: 8px;
        }
        .menu-header p {
            color: #fff1e0;
            font-size: 15px;
            padding: 0 25px;
            line-height: 1.4;
        }
        
        /* Interactive Mode Selector Area */
        .mode-panel {
            background-color: #fff9f2;
            width: 100%;
            border-radius: 40px 40px 0 0;
            flex-grow: 1;
            margin-top: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 30px 20px;
            gap: 25px;
        }
        
        /* Dynamic Avatar Layout */
        .avatar-container {
            width: 105px;
            height: 105px;
            border-radius: 50%;
            background-color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 6px 0 rgba(0,0,0,0.08);
            position: relative;
        }
        .emoji-face {
            width: 86px;
            height: 86px;
            border-radius: 50%;
            position: relative;
            border: 5px solid #000;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.2s ease;
        }
        
        /* Custom CSS Emoji Layouts */
        .emoji-face.easy-face { background-color: #2ecc71; }
        .emoji-face.medium-face { background-color: #f1c40f; }
        .emoji-face.hard-face { background-color: #e74c3c; }

        /* Horns for Hard Avatar */
        .emoji-face.hard-face::before, .emoji-face.hard-face::after {
            content: ''; position: absolute; top: -12px;
            width: 22px; height: 22px; background-color: #000; border-radius: 50%;
        }
        .emoji-face.hard-face::before { left: -5px; }
        .emoji-face.hard-face::after { right: -5px; }

        .mode-title-text {
            font-size: 38px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        /* Custom Slider Bar Control */
        .slider-container {
            position: relative;
            width: 75%;
            height: 36px;
            background-color: #7f8c8d;
            border-radius: 20px;
            border: 4px solid white;
            cursor: pointer;
        }
        .slider-handle {
            position: absolute;
            top: -2px;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background-color: #2ecc71;
            border: 4px solid white;
            transition: left 0.15s ease, background-color 0.15s ease;
        }
        
        /* Play Button Trigger */
        .main-play-btn {
            width: 75%;
            height: 60px;
            background-color: #2ecc71;
            color: white;
            border: none;
            border-radius: 18px;
            font-size: 26px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 6px 0 #27ae60;
            text-transform: uppercase;
        }
        .main-play-btn:active {
            transform: translateY(4px);
            box-shadow: none;
        }
        
        /* Leaderboard / Game Over Modal Overlay */
        #screenOverlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(40, 30, 40, 0.6);
            display: none; 
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 20;
            padding: 20px;
        }
        .game-over-card {
            background-color: #a37c74;
            border-radius: 35px;
            width: 90%;
            padding: 25px 20px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
            border: 4px solid #85615a;
            position: relative;
            margin-bottom: 25px;
        }
        .game-over-card h1 {
            color: #ffffff;
            font-size: 32px;
            text-transform: uppercase;
            margin-bottom: 15px;
        }
        .current-score-section .score-lbl { color: #f7a379; font-size: 24px; font-weight: bold; }
        .current-score-section .score-num { color: #ffffff; font-size: 60px; font-weight: bold; }
        
        .leaderboard-box {
            background-color: #fff1df;
            border-radius: 20px;
            padding: 15px 12px;
            margin-top: 15px;
            border: 3px solid #edd3be;
        }
        .leaderboard-box .mode-title { color: #ff5252; font-size: 14px; font-weight: bold; margin-bottom: 10px; text-transform: uppercase; }
        .score-row {
            background-color: #8a645d; color: white; border-radius: 12px;
            padding: 8px 15px; margin-bottom: 8px; display: flex;
            justify-content: space-between; align-items: center; font-size: 15px; font-weight: bold;
        }
        .score-row.today { color: #ffd32c; }
        .score-row.week { color: #ff9ff3; }
        .score-row.alltime { color: #1dd1a1; }
        
        .button-container { display: flex; width: 90%; gap: 15px; justify-content: center; }
        .home-btn {
            background-color: #d96e62; border: none; border-radius: 15px;
            width: 65px; height: 60px; cursor: pointer; display: flex;
            justify-content: center; align-items: center; box-shadow: 0 5px 0 #b05349;
        }
        .home-btn svg { fill: white; width: 28px; height: 28px; }
        .play-again-btn {
            background-color: #2ed573; color: white; border: none; border-radius: 15px;
            flex-grow: 1; height: 60px; font-size: 22px; font-weight: bold;
            cursor: pointer; box-shadow: 0 5px 0 #26af5f; text-transform: uppercase;
        }

        #bonusText {
            position: absolute; color: #ffd700; font-weight: bold; font-size: 24px;
            display: none; text-shadow: 2px 2px 4px #000; z-index: 15; pointer-events: none;
        }
    </style>
</head>
<body>

<div id="gameContainer">
    <div id="gameHUD" class="top-bar">
        <div class="score-box">
            <div id="hudModeName" class="label">EASY MODE</div>
            <div id="currentScore" class="val">0</div>
        </div>
        <div class="score-box all-time">
            <div class="label">ALL TIME</div>
            <div id="highScore" class="val">0</div>
        </div>
    </div>
    
    <div id="bonusText">2X PERFECT!</div>
    
    <div id="menuOverlay">
        <div class="menu-header">
            <h1>FLAPPY JUMP</h1>
            <p>Tap to jump and shoot as many baskets as you can.</p>
        </div>
        
        <div class="mode-panel">
            <div class="avatar-container">
                <div id="menuAvatar" class="emoji-face easy-face">
                    <div style="position:absolute; width:12px; height:12px; background:#000; border-radius:50%; top:24px; left:20px;"></div>
                    <div style="position:absolute; width:12px; height:12px; background:#000; border-radius:50%; top:24px; right:20px;"></div>
                    <div id="avatarMouth" style="position:absolute; width:24px; height:12px; border-bottom:4px solid #000; border-radius:0 0 12px 12px; top:44px;"></div>
                </div>
            </div>
            
            <div id="menuModeTitle" class="mode-title-text" style="color: #2ecc71;">EASY</div>
            
            <div class="slider-container" onclick="handleSliderClick(event)">
                <div id="modeSliderHandle" class="slider-handle" style="left: 0%;"></div>
            </div>
            
            <button class="main-play-btn" onclick="launchGame()">PLAY</button>
        </div>
    </div>
    
    <canvas id="gameCanvas"></canvas>
    
    <div id="screenOverlay">
        <div class="game-over-card">
            <h1>GAME OVER</h1>
            <div class="current-score-section">
                <div class="score-lbl">Score</div>
                <div id="finalScore" class="score-num">0</div>
            </div>
            <div class="leaderboard-box">
                <div id="leaderboardTitle" class="mode-title">EASY MODE</div>
                <div class="score-row today">
                    <div class="left-side">🏆 Today's best</div>
                    <div id="todayBestVal">0</div>
                </div>
                <div class="score-row week">
                    <div class="left-side">🏆 Week's best</div>
                    <div id="weekBestVal">0</div>
                </div>
                <div class="score-row alltime">
                    <div class="left-side">🏆 All-time best</div>
                    <div id="allTimeBestVal">0</div>
                </div>
            </div>
        </div>
        <div class="button-container">
            <button class="home-btn" onclick="exitToMenu()">
                <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
            </button>
            <button class="play-again-btn" onclick="launchGame()">PLAY AGAIN</button>
        </div>
    </div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('currentScore');
    const highScoreEl = document.getElementById('highScore');
    const screenOverlay = document.getElementById('screenOverlay');
    const menuOverlay = document.getElementById('menuOverlay');
    const gameHUD = document.getElementById('gameHUD');
    const finalScoreEl = document.getElementById('finalScore');
    
    // Menu Configuration DOMElements
    const menuAvatar = document.getElementById('menuAvatar');
    const menuModeTitle = document.getElementById('menuModeTitle');
    const modeSliderHandle = document.getElementById('modeSliderHandle');
    const avatarMouth = document.getElementById('avatarMouth');
    const hudModeName = document.getElementById('hudModeName');
    const leaderboardTitle = document.getElementById('leaderboardTitle');

    const todayBestEl = document.getElementById('todayBestVal');
    const weekBestEl = document.getElementById('weekBestVal');
    const allTimeBestEl = document.getElementById('allTimeBestVal');
    const bonusText = document.getElementById('bonusText');

    let currentModeIndex = 0; // 0 = Easy, 1 = Medium, 2 = Hard
    const modesConfig = [
        { name: "EASY", color: "#2ecc71", sliderLeft: "0%", speed: 2.2, gap: 260, btnBg: "#2ecc71", btnBox: "#27ae60" },
        { name: "MEDIUM", color: "#f1c40f", sliderLeft: "42%", speed: 2.8, gap: 220, btnBg: "#f1c40f", btnBox: "#d4ac0d" },
        { name: "HARD", color: "#e74c3c", sliderLeft: "82%", speed: 3.5, gap: 180, btnBg: "#e74c3c", btnBox: "#c0392b" }
    ];

    function resizeCanvas() {
        canvas.width = canvas.parentElement.clientWidth;
        canvas.height = canvas.parentElement.clientHeight;
    }
    resizeCanvas();

    let ball, hoops, score, gameRunning, gameLoopId;
    let showCross = false, crossX = 0, crossY = 0;

    // Load Scores depending on Mode type
    function getScoresForMode(modeName) {
        return {
            alltime: localStorage.getItem(`fd_alltime_${modeName}`) || 0,
            today: localStorage.getItem(`fd_today_${modeName}`) || 0,
            week: localStorage.getItem(`fd_week_${modeName}`) || 0
        };
    }

    function updateMenuUI() {
        const config = modesConfig[currentModeIndex];
        menuModeTitle.innerText = config.name;
        menuModeTitle.style.color = config.color;
        modeSliderHandle.style.left = config.sliderLeft;
        modeSliderHandle.style.backgroundColor = config.color;
        
        // Reset dynamic avatar classes
        menuAvatar.className = "emoji-face";
        if (currentModeIndex === 0) {
            menuAvatar.classList.add("easy-face");
            avatarMouth.style.borderRadius = "0 0 12px 12px";
            avatarMouth.style.height = "12px";
        } else if (currentModeIndex === 1) {
            menuAvatar.classList.add("medium-face");
            avatarMouth.style.borderRadius = "0";
            avatarMouth.style.height = "4px";
        } else {
            menuAvatar.classList.add("hard-face");
            avatarMouth.style.borderRadius = "12px 12px 0 0";
            avatarMouth.style.height = "10px";
        }

        // Update main configuration buttons color sync
        document.querySelector('.main-play-btn').style.backgroundColor = config.btnBg;
        document.querySelector('.main-play-btn').style.boxShadow = `0 6px 0 ${config.btnBox}`;
        
        let sc = getScoresForMode(config.name);
        highScoreEl.innerText = sc.alltime;
    }

    function handleSliderClick(event) {
        const rect = event.currentTarget.getBoundingClientRect();
        const clickX = event.clientX - rect.left;
        const relativeX = clickX / rect.width;

        if (relativeX < 0.33) currentModeIndex = 0;
        else if (relativeX < 0.66) currentModeIndex = 1;
        else currentModeIndex = 2;

        updateMenuUI();
    }

    class Ball {
        constructor() {
            this.x = canvas.width * 0.25;
            this.y = canvas.height / 2;
            this.radius = 14;
            this.velocity = 0;
        }
        draw() {
            ctx.fillStyle = "#ffffff";
            ctx.strokeStyle = "#000000";
            ctx.lineWidth = 2.5;

            // Render Two Action Wings
            ctx.beginPath();
            if (this.velocity < 0) {
                ctx.ellipse(this.x - 16, this.y - 5, 12, 6, -Math.PI/6, 0, Math.PI * 2);
            } else {
                ctx.ellipse(this.x - 16, this.y + 2, 12, 6, Math.PI/6, 0, Math.PI * 2);
            }
            ctx.fill(); ctx.stroke();

            ctx.beginPath();
            if (this.velocity < 0) {
                ctx.ellipse(this.x + 16, this.y - 5, 12, 6, Math.PI/6, 0, Math.PI * 2);
            } else {
                ctx.ellipse(this.x + 16, this.y + 2, 12, 6, -Math.PI/6, 0, Math.PI * 2);
            }
            ctx.fill(); ctx.stroke();

            // Basketball Body Texture
            ctx.fillStyle = "#e67e22";
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
            ctx.fill(); ctx.stroke();
            
            ctx.lineWidth = 1.5;
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.radius, -Math.PI/4, Math.PI * 0.75);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(this.x - this.radius, this.y);
            ctx.lineTo(this.x + this.radius, this.y);
            ctx.stroke();
        }
        update() {
            this.velocity += 0.38;
            this.y += this.velocity;
            if (this.y + this.radius > canvas.height || this.y - this.radius < 0) {
                triggerCross(canvas.width / 2, canvas.height / 2);
            }
        }
        flap() { this.velocity = -7.0; }
    }

    class Hoop {
        constructor() {
            const config = modesConfig[currentModeIndex];
            this.x = canvas.width + 60;
            this.y = Math.random() * (canvas.height * 0.45) + (canvas.height * 0.25);
            this.width = 95;  // Mota wide space hole view
            this.height = 20; // Thicker Ring Rim
            this.speed = config.speed;
            this.passed = false;
        }
        drawNet() {
            // Back layer of net mesh mesh string
            ctx.strokeStyle = "rgba(255, 255, 255, 0.45)";
            ctx.lineWidth = 2.5;
            ctx.fillStyle = "rgba(255, 255, 255, 0.12)";
            ctx.beginPath();
            ctx.moveTo(this.x + 8, this.y + this.height/2);
            ctx.lineTo(this.x + 22, this.y + 45);
            ctx.lineTo(this.x + this.width - 22, this.y + 45);
            ctx.lineTo(this.x + this.width - 8, this.y + this.height/2);
            ctx.closePath();
            ctx.fill(); ctx.stroke();
        }
        drawRim() {
            // Thicker 3D Real Hoop Construction with an inside empty visible opening space
            ctx.lineWidth = 8;
            ctx.strokeStyle = "#1a1a1a"; // Hard border frame
            ctx.beginPath();
            ctx.ellipse(this.x + this.width/2, this.y, this.width/2, this.height/2, 0, 0, Math.PI * 2);
            ctx.stroke();

            // Real Deep Glossy Red Color Fill
            let gradient = ctx.createLinearGradient(this.x, this.y - this.height/2, this.x, this.y + this.height/2);
            gradient.addColorStop(0, "#ff5252");
            gradient.addColorStop(1, "#b31b27");
            
            ctx.fillStyle = gradient;
            ctx.beginPath();
            ctx.ellipse(this.x + this.width/2, this.y, this.width/2, this.height/2, 0, 0, Math.PI * 2);
            ctx.fill();

            // Specular shiny white point curve track line
            ctx.lineWidth = 2.5;
            ctx.strokeStyle = "rgba(255, 255, 255, 0.75)";
            ctx.beginPath();
            ctx.ellipse(this.x + this.width/2, this.y - 3, this.width/2.3, this.height/4, 0, Math.PI, Math.PI * 2);
            ctx.stroke();
        }
    }

    function drawCrossMark(x, y) {
        ctx.save();
        ctx.lineWidth = 16;
        ctx.strokeStyle = "rgba(75, 65, 65, 0.9)";
        ctx.lineCap = "round";
        let size = 42;
        ctx.beginPath();
        ctx.moveTo(x - size, y - size); ctx.lineTo(x + size, y + size);
        ctx.moveTo(x + size, y - size); ctx.lineTo(x - size, y + size);
        ctx.stroke();
        ctx.restore();
    }

    function launchGame() {
        menuOverlay.style.display = 'none';
        screenOverlay.style.display = 'none';
        gameHUD.style.display = 'flex';
        
        const config = modesConfig[currentModeIndex];
        hudModeName.innerText = `${config.name} MODE`;
        
        showCross = false;
        ball = new Ball();
        hoops = [new Hoop()];
        score = 0;
        scoreEl.innerText = score;
        
        let sc = getScoresForMode(config.name);
        highScoreEl.innerText = sc.alltime;

        gameRunning = true;
        if(gameLoopId) cancelAnimationFrame(gameLoopId);
        gameLoop();
    }

    function exitToMenu() {
        screenOverlay.style.display = 'none';
        gameHUD.style.display = 'none';
        menuOverlay.style.display = 'flex';
        updateMenuUI();
    }

    function triggerCross(x, y) {
        gameRunning = false;
        showCross = true;
        crossX = x;
        crossY = y;

        // Draw cross display layout over current viewport instantly
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "#d1c9b0";
        ctx.beginPath(); ctx.moveTo(0, canvas.height); ctx.lineTo(canvas.width * 0.5, canvas.height * 0.75); ctx.lineTo(canvas.width, canvas.height); ctx.fill();
        hoops.forEach(h => { h.drawNet(); h.drawRim(); });
        ball.draw();
        drawCrossMark(crossX, crossY);

        setTimeout(showLeaderboardCard, 1000);
    }

    function showLeaderboardCard() {
        cancelAnimationFrame(gameLoopId);
        finalScoreEl.innerText = score;
        const currentModeName = modesConfig[currentModeIndex].name;
        leaderboardTitle.innerText = `${currentModeName} MODE`;

        let sc = getScoresForMode(currentModeName);

        if (score > sc.today) { sc.today = score; localStorage.setItem(`fd_today_${currentModeName}`, score); }
        if (score > sc.week) { sc.week = score; localStorage.setItem(`fd_week_${currentModeName}`, score); }
        if (score > sc.alltime) { sc.alltime = score; localStorage.setItem(`fd_alltime_${currentModeName}`, score); }

        todayBestEl.innerText = sc.today;
        weekBestEl.innerText = sc.week;
        allTimeBestEl.innerText = sc.alltime;
        highScoreEl.innerText = sc.alltime;

        screenOverlay.style.display = 'flex';
    }

    function gameLoop() {
        if (!gameRunning) return;
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Ground hill style artwork
        ctx.fillStyle = "#d1c9b0";
        ctx.beginPath(); ctx.moveTo(0, canvas.height); ctx.lineTo(canvas.width * 0.5, canvas.height * 0.75); ctx.lineTo(canvas.width, canvas.height); ctx.fill();

        const config = modesConfig[currentModeIndex];
        if (hoops.length === 0 || hoops[hoops.length - 1].x < canvas.width - config.gap) {
            hoops.push(new Hoop());
        }

        // Draw back net structures
        for (let i = 0; i < hoops.length; i++) hoops[i].drawNet();

        for (let i = hoops.length - 1; i >= 0; i--) {
            let h = hoops[i];
            h.x -= h.speed;
            h.drawRim();

            let insideLeft = h.x + 8;
            let insideRight = h.x + h.width - 8;

            // STRICT CRITICAL TRIPPERS - Out handling if colliding from beneath/edges
            if (!h.passed && ball.x > insideLeft && ball.x < insideRight) {
                // Ball hitting rim boundaries upward direction action
                if (ball.y > h.y && ball.velocity < 0 && Math.abs(ball.y - h.y) < ball.radius + 6) {
                    triggerCross(h.x + h.width/2, h.y); return;
                }
            }

            // Absolute inside entry cross scoring validation tracking
            if (!h.passed && ball.x > insideLeft && ball.x < insideRight) {
                if (ball.y >= h.y && (ball.y - ball.velocity) < h.y) {
                    h.passed = true;
                    score += 1;
                    scoreEl.innerText = score;
                }
            }

            // Missed loop boundary verification check
            if (!h.passed && ball.x > insideRight + 12) { 
                triggerCross(h.x + h.width/2, h.y); return; 
            }

            if (h.x + h.width < 0) hoops.splice(i, 1);
        }

        ball.update();
        ball.draw();
        gameLoopId = requestAnimationFrame(gameLoop);
    }

    // Interactive Trigger Setup listeners
    window.addEventListener('keydown', (e) => { if (e.code === 'Space' && gameRunning) ball.flap(); });
    canvas.addEventListener('touchstart', (e) => { if (gameRunning) { ball.flap(); e.preventDefault(); } }, { passive: false });
    canvas.addEventListener('mousedown', () => { if (gameRunning) ball.flap(); });
    window.addEventListener('resize', resizeCanvas);

    // Initial setup configurations trigger call
    updateMenuUI();
</script>
</body>
</html>
